<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="404 - Page Not Found">
<title>nick@burczyk:~$ — 404</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/portfolio.css' %}">
<link rel="stylesheet" href="{% static 'css/404.css' %}">
</head>
<body>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<div id="screen">

  <div id="titlebar">
    <div class="ttl">NICK BURCZYK — 404</div>
    <div class="clk" id="clock">00:00:00</div>
  </div>

  <div id="main">
    <div class="terminal-window">
      <div class="win-bar">
        <div class="dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <span class="win-title">segfault — core dumped — pid 404</span>
      </div>

      <div class="win-body">

        <div class="err-num" id="errnum">404</div>
        <div class="err-label">SEGMENTATION FAULT</div>

        <hr class="divider">

        <div id="kp-output"></div>

        <div class="tw-wrap">
          <div class="tw-msg" id="tw-msg"></div>
        </div>

        <div class="actions">
          <a href="/" class="btn-home">↩ &nbsp;cd ~/ &nbsp;&nbsp;return home</a>
          <button class="btn-back" onclick="history.back()">← &nbsp;go back</button>
        </div>

        <div class="bottom-prompt">
          <span style="color:var(--mgs-border)">nick@burczyk:~$</span>
          <span style="color:var(--mgs-teal)">find . -name "this_page"</span>
          <span class="cursor"></span>
        </div>

      </div>
    </div>
  </div>

  <div id="statusbar">
    <span><span style="color:var(--alert-red)">✖ EXIT CODE 404</span> &nbsp;·&nbsp; page not found</span>
    <span>UTF-8 &nbsp;·&nbsp; LF &nbsp;·&nbsp; <span id="sclk">00:00:00</span></span>
  </div>

</div>

<script src="{% static 'scripts/404.js' %}"></script>
</body>
</html>
