<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="404 - Page Not Found">
<title>nick@burczyk:~$ — 404</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --g:    #00ff41;
  --gd:   #00aa2a;
  --gdark:#003b0f;
  --glow: rgba(0,255,65,0.18);
  --bg:   #020c02;
  --bg2:  #050f05;
  --t:    #00cc33;
  --td:   #006615;
  --tb:   #00ff41;
  --red:  #ff4444;
  --redf: rgba(255,68,68,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;background:var(--bg);
  color:var(--t);font-family:'Share Tech Mono',monospace;
  overflow:hidden;
}

/* CRT scanlines */
body::before{
  content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
}
body::after{
  content:'';position:fixed;inset:0;z-index:999;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.7) 100%);
}

.scanline{
  position:fixed;left:0;right:0;height:3px;
  background:rgba(0,255,65,0.05);z-index:998;pointer-events:none;
  animation:scan 7s linear infinite;
}
@keyframes scan{0%{top:-3px}100%{top:100vh}}

/* random flicker */
@keyframes flicker{
  0%,100%{opacity:1} 88%{opacity:1} 89%{opacity:.75} 90%{opacity:1} 96%{opacity:.88} 97%{opacity:1}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  10%{transform:translateX(-4px)}
  20%{transform:translateX(4px)}
  30%{transform:translateX(-3px)}
  40%{transform:translateX(3px)}
  50%{transform:translateX(-2px)}
  60%{transform:translateX(2px)}
  70%,90%{transform:translateX(0)}
}
@keyframes glitch-skew{
  0%,100%{transform:skew(0deg)}
  20%{transform:skew(-0.5deg)}
  40%{transform:skew(0.3deg)}
  60%{transform:skew(0deg)}
}
@keyframes rgb-split{
  0%,100%{text-shadow:none}
  25%{text-shadow:-3px 0 #ff0000, 3px 0 #0000ff}
  50%{text-shadow:3px 0 #ff0000, -3px 0 #0000ff}
  75%{text-shadow:-2px 0 #ff0000, 2px 0 #0000ff}
}
@keyframes scanbar{
  0%{top:0;opacity:0.06}
  50%{opacity:0.1}
  100%{top:100%;opacity:0.06}
}
@keyframes type{
  from{width:0}
  to{width:100%}
}

#screen{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  animation:flicker 9s infinite;
}

/* ── TITLEBAR ── */
#titlebar{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px;background:#010801;border-bottom:1px solid #002808;flex-shrink:0;
}
.dots{display:flex;gap:8px;}
.dot{width:12px;height:12px;border-radius:50%;}
.dot-r{background:#ff5555;box-shadow:0 0 5px rgba(255,85,85,.5);}
.dot-y{background:#ffbb00;box-shadow:0 0 5px rgba(255,187,0,.4);}
.dot-g{background:var(--red);box-shadow:0 0 8px rgba(255,68,68,.5);animation:blink 1.2s infinite;}
.ttl{font-family:'VT323',monospace;font-size:17px;color:var(--td);letter-spacing:2px;}
.clk{font-size:12px;color:var(--td);letter-spacing:1px;}

/* ── MAIN ── */
#main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;overflow:auto;
}

.terminal-window{
  width:100%;max-width:680px;
  border:1px solid #002808;border-radius:4px;
  background:var(--bg2);overflow:hidden;
  box-shadow:0 0 60px rgba(0,255,65,0.04), 0 0 2px rgba(0,255,65,0.2);
  animation:fadeIn .4s ease forwards;
  position:relative;
}

/* moving scan bar inside window */
.terminal-window::before{
  content:'';position:absolute;left:0;right:0;height:40px;
  background:linear-gradient(transparent,rgba(0,255,65,0.03),transparent);
  z-index:10;pointer-events:none;
  animation:scanbar 4s linear infinite;
}

.win-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;background:#010a01;border-bottom:1px solid #002808;
}
.win-bar .wdots{display:flex;gap:6px;}
.win-bar .wd{width:10px;height:10px;border-radius:50%;}
.wd-r{background:#ff5555;}
.wd-y{background:#ffbb00;}
.wd-g{background:var(--red);animation:blink 1.2s infinite;}
.win-title{color:var(--td);font-size:11px;letter-spacing:2px;margin-left:6px;}

.win-body{padding:24px 28px 28px;}

/* ── 404 NUMBER ── */
.err-num{
  font-family:'VT323',monospace;
  font-size:clamp(80px,18vw,140px);
  color:var(--red);
  line-height:1;
  text-shadow:0 0 30px rgba(255,68,68,.4), 0 0 60px rgba(255,68,68,.1);
  animation:rgb-split 3s infinite, glitch-skew 4s infinite;
  user-select:none;
}

.err-label{
  font-family:'VT323',monospace;
  font-size:22px;color:var(--red);
  letter-spacing:3px;
  margin-top:-4px;
  margin-bottom:20px;
  opacity:.85;
}

.divider{
  border:none;border-top:1px solid #002808;
  margin:16px 0;
}

/* ── KERNEL PANIC LINES ── */
.kp-line{
  font-size:12px;line-height:1.9;color:#336633;
  white-space:pre-wrap;
}
.kp-line.red{color:var(--red);opacity:.9;}
.kp-line.bright{color:var(--tb);}
.kp-line.dim{color:var(--td);}
.kp-line.yellow{color:#ccff00;}

/* ── TYPEWRITER MESSAGE ── */
.tw-wrap{
  margin:18px 0 20px;
  border:1px solid #002808;border-left:3px solid var(--red);
  background:#030803;padding:14px 16px;border-radius:2px;
}
.tw-msg{
  font-size:14px;color:#88cc88;line-height:1.7;
  overflow:hidden;
  display:inline-block;
}

/* ── ACTIONS ── */
.actions{
  display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;
}
.btn-home{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;border:1px solid var(--g);
  color:var(--g);font-family:'Share Tech Mono',monospace;
  font-size:13px;padding:10px 22px;border-radius:2px;
  text-decoration:none;cursor:pointer;
  transition:all .2s;
  box-shadow:0 0 0 rgba(0,255,65,0);
  letter-spacing:1px;
}
.btn-home:hover{
  background:rgba(0,255,65,.08);
  box-shadow:0 0 16px rgba(0,255,65,.2);
}
.btn-back{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;border:1px solid #003810;
  color:#447744;font-family:'Share Tech Mono',monospace;
  font-size:13px;padding:10px 22px;border-radius:2px;
  cursor:pointer;transition:all .2s;letter-spacing:1px;
}
.btn-back:hover{border-color:#336633;color:var(--t);background:rgba(0,255,65,.04);}

/* ── PROMPT AT BOTTOM ── */
.bottom-prompt{
  margin-top:20px;
  font-size:13px;color:var(--td);
  display:flex;align-items:center;gap:6px;
}
.bottom-prompt .cursor{
  display:inline-block;width:9px;height:14px;
  background:var(--g);animation:blink .7s infinite;vertical-align:middle;
}

/* ── STATUS BAR ── */
#statusbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 16px;background:#010801;border-top:1px solid #002808;
  font-size:11px;color:var(--td);letter-spacing:1px;flex-shrink:0;
}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="screen">

  <!-- TITLEBAR -->
  <div id="titlebar">
    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="ttl">nick@burczyk — bash — FATAL ERROR</div>
    <div class="clk" id="clock">00:00:00</div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div class="terminal-window">
      <div class="win-bar">
        <div class="wdots">
          <div class="wd wd-r"></div>
          <div class="wd wd-y"></div>
          <div class="wd wd-g"></div>
        </div>
        <span class="win-title">segfault — core dumped — pid 404</span>
      </div>

      <div class="win-body">

        <!-- Big 404 -->
        <div class="err-num" id="errnum">404</div>
        <div class="err-label">SEGMENTATION FAULT</div>

        <hr class="divider">

        <!-- Kernel panic output -->
        <div id="kp-output"></div>

        <!-- Typewriter message -->
        <div class="tw-wrap">
          <div class="tw-msg" id="tw-msg"></div>
        </div>

        <!-- Actions -->
        <div class="actions">
          <a href="/" class="btn-home">
            <span>↩</span> cd ~/ &nbsp;&nbsp;return home
          </a>
          <button class="btn-back" onclick="history.back()">
            <span>←</span> go back
          </button>
        </div>

        <!-- Blinking prompt -->
        <div class="bottom-prompt">
          <span style="color:var(--td)">nick@burczyk:~$</span>
          <span style="color:#447744">find . -name "this_page"</span>
          <span class="cursor"></span>
        </div>

      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <span><span style="color:var(--red)">✖ EXIT CODE 404</span> &nbsp;·&nbsp; page not found</span>
    <span>UTF-8 &nbsp;·&nbsp; LF &nbsp;·&nbsp; <span id="sclk">00:00:00</span></span>
  </div>

</div><!-- /screen -->

<script>
// Clock
function tick(){
  const t=new Date().toLocaleTimeString('en-US',{hour12:false});
  document.getElementById('clock').textContent=t;
  document.getElementById('sclk').textContent=t;
}
tick();setInterval(tick,1000);

// Kernel panic lines
const KP_LINES=[
  {t:'[  0.000000] Kernel panic — not syncing: Attempted to access invalid address',c:'red',d:0},
  {t:'[  0.000001] CPU: 0 PID: 404 Comm: nginx Not tainted 6.6.0-custom',c:'',d:80},
  {t:'[  0.000002] Hardware name: Nick\'s Server Box / UAB-CS-Lab',c:'',d:160},
  {t:'[  0.000003] Call trace:',c:'yellow',d:240},
  {t:'[  0.000004]  __die+0x1c/0x68',c:'dim',d:300},
  {t:'[  0.000005]  page_fault_oops+0x14c/0x220',c:'dim',d:360},
  {t:'[  0.000006]  do_user_addr_fault+0x1a8/0x620',c:'dim',d:420},
  {t:'[  0.000007]  exc_page_fault+0x70/0x190',c:'dim',d:480},
  {t:'[  0.000008] RIP: route_lookup+0x0 <path: /blog/coming-soon>',c:'red',d:560},
  {t:'[  0.000009] Code: NULL pointer dereference — address 0x000000000000',c:'red',d:640},
  {t:'[  0.000010] ---[ end Kernel panic ]---',c:'bright',d:740},
];

const kpOut=document.getElementById('kp-output');
KP_LINES.forEach(({t,c,d})=>{
  setTimeout(()=>{
    const div=document.createElement('div');
    div.className=`kp-line ${c}`;
    div.style.animation='fadeIn .2s ease forwards';
    div.textContent=t;
    kpOut.appendChild(div);
  },d);
});

// Typewriter message
const MSG="Oops — the page you're looking for doesn't exist yet. The blog is coming soon. In the meantime, head back home to explore my projects.";
const tw=document.getElementById('tw-msg');
let i=0;
function typeNext(){
  if(i<MSG.length){
    tw.textContent+=MSG[i++];
    setTimeout(typeNext, i<MSG.length ? (MSG[i-1]==='.'?120:28) : 0);
  }
}
setTimeout(typeNext, 900);

// Glitch the 404 number randomly
const errNum=document.getElementById('errnum');
const glitchNums=['4O4','404','40₄','ᗺ04','404','4Ø4','404'];
setInterval(()=>{
  if(Math.random()<0.15){
    const orig=errNum.textContent;
    errNum.textContent=glitchNums[Math.floor(Math.random()*glitchNums.length)];
    errNum.style.animation='shake .3s ease, rgb-split 0.3s, glitch-skew 0.3s';
    setTimeout(()=>{
      errNum.textContent='404';
      errNum.style.animation='rgb-split 3s infinite, glitch-skew 4s infinite';
    },200);
  }
},2500);
</script>
</body>
</html>
