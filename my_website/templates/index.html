<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noai, noimageai">
<meta name="robots" content="noindex, nofollow">
<title>Nick Burczyk</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/portfolio.css' %}?t={% now 'U' %}">
</head>
<body>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<!-- CODEC INTRO -->
<div id="codec-screen">
  <div class="codec-inner">
    <div class="codec-call-box">
      <div class="codec-call-text">CALL</div>
    </div>
    <div class="codec-sub">PUSH SELECT</div>
    <button class="codec-btn" id="codec-btn" onclick="enterSite()">[ SELECT ]</button>
  </div>
</div>

<!-- CODEC MAIN SCREEN -->
<div id="screen">
  <div id="cx-top">
    <div class="ttl">NICK BURCZYK</div>
  </div>

  <div id="cx-codec">
    <div class="cx-portrait" id="cx-portrait-l">
      <img id="campbell" src="{% static 'codec/campbell_f00.png' %}" alt="Colonel">
      <div class="cx-noise"></div>
    </div>

    <div class="cx-device-col">
      <div class="cx-ptt">PTT</div>
      <div class="cx-device-wrap">
        <button class="cx-arrow left" onclick="tuneStep(-1)" aria-label="Previous frequency"></button>
        <div class="cx-device">
          <div class="cx-bars" id="cx-bars"></div>
          <div class="cx-freq"><span class="ghost">888.88</span><span id="freq-num">140.85</span></div>
        </div>
        <button class="cx-arrow right" onclick="tuneStep(1)" aria-label="Next frequency"></button>
      </div>
      <button class="cx-memory" onclick="toggleMemory()">MEMORY</button>
    </div>

    <div class="cx-portrait" id="cx-portrait-r">
      <img id="snake" src="{% static 'codec/snake_f00.png' %}" alt="Visitor">
      <div class="cx-noise"></div>
    </div>
  </div>

  <div id="cx-contact-name">COLONEL</div>
  <div id="cx-dialogue" onclick="skipTyping()" title="Click to skip"></div>

  <div id="cx-content"><div id="output"></div></div>

  <div id="cx-memory-panel">
    <div class="cx-mem-title">◈ MEMORY</div>
    <div id="cx-mem-list"></div>
    <div class="cx-mem-foot">◄ ► TUNE &nbsp;·&nbsp; M MEMORY &nbsp;·&nbsp; ESC CLOSE</div>
  </div>
</div>

<!-- Pass Django static URLs to JavaScript -->
<script>
const STATIC_URLS = {
  ring:       "{% static 'audio/ring.mp3' %}",
  hover:      "{% static 'audio/hover.mp3' %}",
  click:      "{% static 'audio/click.mp3' %}",
  error:      "{% static 'audio/error.mp3' %}",
  menu:       "{% static 'audio/menu.mp3' %}",
  open:       "{% static 'audio/open.mp3' %}",
  uploadFile: "{% url 'upload_file' %}",
  gallery:    "{% url 'gallery' %}",
  codecBase:  "{% static 'codec' %}",
  voiceBase:  "{% static 'audio/codec' %}",
};
</script>
<script src="{% static 'scripts/portfolio.js' %}?t={% now 'U' %}"></script>
</body>
</html>
