<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nick@burczyk:~$</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --g:   #00ff41;
  --gd:  #00aa2a;
  --gdark: #003b0f;
  --glow: rgba(0,255,65,0.18);
  --bg:  #020c02;
  --bg2: #050f05;
  --bg3: #030a03;
  --t:   #00cc33;
  --td:  #006615;
  --tb:  #00ff41;
  --o: #ffaa00;
  --oglow: rgba(255,170,0,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Share Tech Mono',monospace;overflow:hidden;}

/* CRT scanlines */
body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);}
body::after{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.65) 100%);}

.scanline{position:fixed;left:0;right:0;height:3px;background:rgba(0,255,65,0.05);z-index:998;pointer-events:none;animation:scan 7s linear infinite;}
@keyframes scan{0%{top:-3px}100%{top:100vh}}
@keyframes flicker{0%,100%{opacity:1}88%{opacity:1}89%{opacity:.8}90%{opacity:1}96%{opacity:.92}97%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--glow)}50%{box-shadow:0 0 12px 2px var(--glow)}}

#screen{width:100%;height:100%;display:flex;flex-direction:column;animation:flicker 10s infinite;}

/* ── TITLEBAR ── */
#titlebar{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px;background:#010801;border-bottom:1px solid #002808;flex-shrink:0;
}
.dots{display:flex;gap:8px;}
.dot{width:12px;height:12px;border-radius:50%;}
.dot-r{background:#ff5555;box-shadow:0 0 5px #ff555566;}
.dot-y{background:#ffbb00;box-shadow:0 0 5px #ffbb0066;}
.dot-g{background:var(--g);box-shadow:0 0 5px var(--glow);animation:pulse 3s infinite;}
.ttl{font-family:'VT323',monospace;font-size:17px;color:var(--td);letter-spacing:2px;}
.clk{font-size:12px;color:var(--td);letter-spacing:1px;}

/* ── LAYOUT: sidebar + terminal ── */
#layout{flex:1;display:flex;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{
  width:220px;flex-shrink:0;
  background:#010a01;border-right:1px solid #002808;
  display:flex;flex-direction:column;overflow-y:auto;
}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--gdark);}

.sb-section{padding:10px 12px 4px;font-size:10px;color:var(--td);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #001f05;}
.sb-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;background:none;border:none;border-bottom:1px solid #001805;
  padding:9px 14px;cursor:pointer;
  font-family:'Share Tech Mono',monospace;font-size:12px;
  color:#447744;text-align:left;transition:all .15s;
}
.sb-btn:hover{background:#010f01;color:var(--g);padding-left:18px;}
.sb-btn:hover .sb-arrow{opacity:1;}
.sb-btn.active{background:#010f01;color:var(--g);border-left:2px solid var(--g);}
.sb-arrow{color:var(--td);font-size:10px;opacity:0;transition:opacity .15s;margin-left:auto;}
.sb-btn .sb-icon{font-size:14px;width:16px;text-align:center;}

/* project quick-list in sidebar */
.sb-proj-btn{
  display:block;width:100%;background:none;border:none;border-bottom:1px solid #001005;
  padding:7px 14px 7px 28px;cursor:pointer;
  font-family:'Share Tech Mono',monospace;font-size:11px;
  color:#2a5a2a;text-align:left;transition:all .15s;
}
.sb-proj-btn:hover{color:var(--g);background:#010f01;padding-left:32px;}

/* ── TERMINAL PANE ── */
#terminal{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

#output{
  flex:1;overflow-y:auto;
  padding:14px 20px 8px;scroll-behavior:smooth;
}
#output::-webkit-scrollbar{width:4px;}
#output::-webkit-scrollbar-track{background:var(--bg);}
#output::-webkit-scrollbar-thumb{background:var(--gdark);}

/* ── INPUT BAR ── */
#input-area{flex-shrink:0;background:#010801;border-top:1px solid #002808;}

/* quick-command pill row */
#quickbar{
  display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px 6px;
  border-bottom:1px solid #001805;
}
.qbtn{
  background:#010f01;border:1px solid #003810;
  color:#337733;font-family:'Share Tech Mono',monospace;font-size:11px;
  padding:3px 10px;border-radius:2px;cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.qbtn:hover{background:#001f00;color:var(--g);border-color:var(--g);box-shadow:0 0 8px rgba(0,255,65,.12);}

#input-row{display:flex;align-items:center;padding:8px 14px 10px;gap:0;}
#prompt{color:var(--td);font-size:14px;white-space:nowrap;user-select:none;}
#prompt .u{color:var(--g);}
#prompt .h{color:#00dd33;}
#prompt .s{color:var(--g);margin-right:7px;}
#cmd-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--tb);font-family:'Share Tech Mono',monospace;font-size:14px;
  caret-color:var(--g);
}

/* ── OUTPUT ELEMENTS ── */
.line{font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.fade-in{animation:fadeIn .2s ease forwards;}
.green{color:var(--g);}
.dim{color:var(--td);}
.bright{color:var(--tb);text-shadow:0 0 8px var(--glow);}
.white{color:#b8ffb8;}
.yellow{color:#ccff00;}
.red{color:#ff5555;}
.cyan{color:#00ffcc;}
.blank{height:5px;}

/* ── ASCII ── */
.ascii{font-family:'VT323',monospace;font-size:16px;color:var(--g);
  text-shadow:0 0 10px rgba(0,255,65,.35);line-height:1.2;white-space:pre;}

/* ── PROJECT CARD ── */
.proj-card{
  border:1px solid #002a08;border-left:3px solid var(--g);
  background:var(--bg2);border-radius:3px;
  margin:4px 0 10px;overflow:hidden;
  animation:fadeIn .25s ease forwards;
}
.proj-card-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px 8px;border-bottom:1px solid #001f05;
}
.proj-card-body{display:flex;gap:0;flex-wrap:wrap;}
.proj-img-wrap{
  width:220px;flex-shrink:0;
  background:#010801;border-right:1px solid #001f05;
  display:flex;align-items:center;justify-content:center;padding:10px;
}
.proj-img-wrap img{
  width:100%;max-height:160px;object-fit:cover;
  border-radius:2px;border:1px solid #002a08;
  filter:none;
  transition:filter .3s;
}
.proj-img-wrap img:hover{filter:saturate(1) brightness(1) sepia(0) hue-rotate(0deg);}
.proj-info{flex:1;padding:10px 14px;min-width:200px;}
.proj-name{color:var(--tb);font-family:'VT323',monospace;font-size:18px;letter-spacing:1px;}
.badge{
  display:inline-block;border:1px solid var(--gd);color:var(--gd);
  font-size:10px;padding:0 6px;margin-left:6px;vertical-align:middle;border-radius:1px;
}
.badge.award{border-color:#ccff00;color:#ccff00;}
.badge.live{border-color:#00ffcc;color:#00ffcc;}
.badge.dev{border-color:#ffaa00;color:#ffaa00;}
.proj-tech{color:var(--td);font-size:11px;margin-top:5px;}
.proj-desc{color:#88cc88;font-size:12px;margin-top:8px;line-height:1.65;}
.proj-tags{margin-top:8px;}
.tag{color:var(--tdark,#003b0f);font-size:10px;color:#336633;}
.proj-link{
  display:inline-block;margin-top:8px;color:var(--g);
  font-size:12px;text-decoration:none;border:1px solid #003810;
  padding:3px 10px;border-radius:2px;transition:all .15s;
}
.proj-link:hover{background:#001f00;box-shadow:0 0 8px var(--glow);}

/* ── CONTACT ROW ── */
.contact-row{
  display:flex;align-items:center;gap:14px;
  border:1px solid #002008;background:var(--bg2);
  padding:10px 14px;margin:3px 0;border-radius:2px;
  transition:all .15s;
}
.contact-row:hover{border-color:var(--gd);background:#010f01;}
.contact-label{color:var(--td);font-size:11px;width:80px;}
.contact-link{color:var(--g);font-size:12px;text-decoration:none;flex:1;}
.contact-link:hover{text-shadow:0 0 8px var(--g);}

/* ── INLINE LINK ── */
a.tl{color:var(--g);text-decoration:none;}
a.tl:hover{text-shadow:0 0 8px var(--g);text-decoration:underline;}

/* ── WHOAMI CARD ── */
.who-card{
  display:flex;gap:20px;flex-wrap:wrap;
  border:1px solid #002808;border-left:3px solid var(--g);
  background:var(--bg2);padding:16px;border-radius:3px;margin:4px 0;
}
.who-photo{flex-shrink:0;}
.who-photo img{
  width:110px;height:110px;object-fit:cover;border-radius:50%;
  border:2px solid var(--gd);
  filter:none;
  box-shadow:0 0 16px rgba(0,255,65,.2);
}
.who-info{flex:1;min-width:180px;}
.who-name{font-family:'VT323',monospace;font-size:26px;color:var(--tb);letter-spacing:1px;text-shadow:0 0 10px var(--glow);}
.who-row{display:flex;gap:8px;margin-top:5px;font-size:12px;}
.who-key{color:var(--td);width:72px;flex-shrink:0;}
.who-val{color:#b8ffb8;}
.who-status{
  margin-top:14px;
  padding:14px 16px;
  border:1px solid rgba(255,170,0,0.35);
  border-left:3px solid var(--o);
  border-radius:12px;
  background:rgba(40,20,0,0.25);
  box-shadow:0 0 10px var(--oglow);
}

.who-status-label{
  font-size:12px;
  letter-spacing:0.12em;
  color:#aa7700;
  margin-bottom:6px;
}

.who-status-value{
  font-size:16px;
  font-weight:700;
  color:var(--o);
}

/* ── MOBILE ── */
@media(max-width:680px){
  #sidebar{display:none;}
  .proj-img-wrap{width:100%;border-right:none;border-bottom:1px solid #001f05;}
  .who-card{flex-direction:column;}
}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="screen">

  <!-- TITLEBAR -->
  <div id="titlebar">
    <div class="dots">

      <button class="sb-btn" onclick="runCmd('clear')"><span class="sb-icon">×</span>clear<span class="sb-arrow">↵</span></button>
    </div>

    <!-- TERMINAL -->
    <div id="terminal">
      <div id="output"></div>

      <div id="input-area">
        <!-- Quick command pills -->
        <div id="quickbar">
          <button class="qbtn" onclick="runCmd('whoami')">▸ whoami</button>
          <button class="qbtn" onclick="runCmd('ls projects')">▸ ls projects</button>
          <button class="qbtn" onclick="runCmd('music')">▸ music</button>
          <button class="qbtn" onclick="runCmd('contact')">▸ contact</button>
          <button class="qbtn" onclick="runCmd('map')">▸ server map</button>
          <button class="qbtn" onclick="runCmd('bird-classifier')" style="border-color:#00aa2a;color:#00aa2a;">▸ bird classifier</button>
          <button class="qbtn" onclick="runCmd('help')">▸ help</button>
          <button class="qbtn" onclick="runCmd('clear')">▸ clear</button>
        </div>
        <div id="input-row">
          <div id="prompt">
            <span class="u">nick</span><span style="color:var(--td)">@</span><span class="h">burczyk</span><span style="color:var(--td)">:~</span><span class="s">$</span>
          </div>
          <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus placeholder="type a command or click above…">
        </div>
      </div>
    </div>

  </div><!-- /layout -->
</div><!-- /screen -->

<script>
// ── DATA ─────────────────────────────────────────────────────

// ── STATE ─────────────────────────────────────────────────────
let hist=[], hIdx=-1;

// ── CLOCK ─────────────────────────────────────────────────────
setInterval(()=>{
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false});
},1000);

// ── OUTPUT HELPERS ────────────────────────────────────────────
const out = document.getElementById('output');
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function ln(html='', cls='line'){
  const d=document.createElement('div');
  d.className=`line ${cls} fade-in`;
  d.innerHTML=html;
  out.appendChild(d);
  out.scrollTop=out.scrollHeight;
}
function bl(){const d=document.createElement('div');d.className='blank fade-in';out.appendChild(d);out.scrollTop=out.scrollHeight;}
function html(h){
  const d=document.createElement('div');
  d.className='fade-in';
  d.innerHTML=h;
  out.appendChild(d);
  out.scrollTop=out.scrollHeight;
}
function echo(cmd){
  ln(`<span style="color:var(--td)">nick@burczyk:~$</span> <span style="color:#00cc33">${esc(cmd)}</span>`);
}

// ── COMMANDS ─────────────────────────────────────────────────
const CMDS = {

help(){
  bl();
  ln('┌──────────────────────────────────────────────────────────────┐','green');
  ln('│                 NICK BURCZYK — COMMAND REFERENCE                    │','green');
  ln('└──────────────────────────────────────────────────────────────┘','green');
  bl();
  [
    ['whoami',            'identity + current status'],
    ['ls projects',       'list all projects'],
    ['cat project [id]',  'view a project  (e.g.  cat project bird-classifier)'],
    ['music',             'Zero Barbecue — Spotify / Bandcamp'],
    ['contact',           'socials and links'],
    ['map',               'live Minecraft server map'],
    ['bird-classifier',   'launch the bird classifier demo'],
    ['clear',             'clear terminal'],

// ── RUNNER ────────────────────────────────────────────────────
function runCmd(raw){
  const input=document.getElementById('cmd-input');
  const trimmed=raw!==undefined?raw:input.value.trim();
  if(raw===undefined)input.value='';

  echo(trimmed);
  if(!trimmed){bl();return;}

  hist.push(trimmed);hIdx=hist.length;

  const lo=trimmed.toLowerCase();

  if(lo.startsWith('cat project')){
    CMDS['cat project'](trimmed.slice('cat project'.length).trim());
    return;
  }

  const fn=CMDS[lo]||CMDS[lo.split(' ')[0]];
  if(fn){fn(trimmed.split(' ').slice(1).join(' '));}
  else{
    ln(`  bash: <span style="color:#ff5555">${esc(trimmed)}</span>: command not found`);
    ln(`  Type <span style="color:var(--g)">help</span> or click a button above`,'dim');
    bl();
  }
}

// ── TAB COMPLETE ──────────────────────────────────────────────
const ALL=['help','whoami','cat project ','ls projects','music','contact','map','bird-classifier','clear'];
const PIDS=PROJECTS.map(p=>p.id);

function tabComp(v){
  const lo=v.toLowerCase();
  if(lo.startsWith('cat project ')){
    const frag=lo.slice('cat project '.length);
    const m=PIDS.find(id=>id.startsWith(frag));
    return m?'cat project '+m:v;
  }
  const m=ALL.find(c=>c.startsWith(lo)&&c!==lo);
  return m||v;
}

// ── INPUT EVENTS ──────────────────────────────────────────────
document.getElementById('cmd-input').addEventListener('keydown',e=>{
  const inp=e.target;
  if(e.key==='Enter'){runCmd();}
  else if(e.key==='Tab'){e.preventDefault();inp.value=tabComp(inp.value);}
  else if(e.key==='ArrowUp'){e.preventDefault();if(hIdx>0){hIdx--;inp.value=hist[hIdx];}}
  else if(e.key==='ArrowDown'){e.preventDefault();if(hIdx<hist.length-1){hIdx++;inp.value=hist[hIdx];}else{hIdx=hist.length;inp.value='';}}
});
document.addEventListener('click',e=>{
  if(!e.target.closest('a')&&!e.target.closest('button')&&!e.target.closest('iframe'))
    document.getElementById('cmd-input').focus();
});
