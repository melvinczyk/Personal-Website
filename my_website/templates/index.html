<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noai, noimageai">
<meta name="robots" content="noindex, nofollow">
<title>Nick Burczyk</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/portfolio.css' %}">
</head>
<body>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<!-- CODEC INTRO -->
<div id="codec-screen">
  <div class="codec-inner">
    <div class="codec-call-box">
      <div class="codec-call-text">CALL</div>
    </div>
    <div class="codec-sub">PUSH SELECT</div>
    <button class="codec-btn" id="codec-btn" onclick="enterSite()">[ SELECT ]</button>
  </div>
</div>

<!-- SOLITON RADAR -->
<div class="radar-display">
  <div class="radar-label">SOLITON RADAR</div>
  <div class="radar-map">
    <svg width="148" height="148" viewBox="0 0 148 148" fill="none">
      <rect x="8"   y="8"   width="60" height="40" stroke="#00aa88" stroke-width="1.2"/>
      <rect x="8"   y="52"  width="24" height="36" stroke="#00aa88" stroke-width="1.2"/>
      <rect x="36"  y="52"  width="32" height="56" stroke="#00aa88" stroke-width="1.2"/>
      <rect x="8"   y="92"  width="24" height="48" stroke="#00aa88" stroke-width="1.2"/>
      <rect x="72"  y="8"   width="68" height="52" stroke="#00aa88" stroke-width="1.2"/>
      <rect x="72"  y="64"  width="36" height="36" stroke="#00aa88" stroke-width="1.2"/>
      <rect x="112" y="64"  width="28" height="76" stroke="#00aa88" stroke-width="1.2"/>
      <rect x="72"  y="104" width="36" height="36" stroke="#00aa88" stroke-width="1.2"/>
      <line x1="68"  y1="28"  x2="72"  y2="28"  stroke="#00aa88" stroke-width="1.2"/>
      <line x1="32"  y1="52"  x2="36"  y2="52"  stroke="#00aa88" stroke-width="1.2"/>
      <line x1="68"  y1="82"  x2="72"  y2="82"  stroke="#00aa88" stroke-width="1.2"/>
      <line x1="108" y1="100" x2="112" y2="100" stroke="#00aa88" stroke-width="1.2"/>
      <rect x="1" y="1" width="146" height="146" stroke="#00331f" stroke-width="0.5"/>
    </svg>
    <div class="player-dot"></div>
    <div class="enemy-dot" style="top:18%;left:60%;"></div>
    <div class="enemy-dot" style="top:70%;left:28%;animation-delay:.5s;"></div>
  </div>
  <div class="radar-footer">RADAR : NORMAL</div>
</div>

<!-- MAIN SCREEN -->
<div id="screen">
  <div id="titlebar">
    <div class="ttl">NICK BURCZYK</div>
    <div class="clk" id="clock">00:00:00</div>
  </div>

  <div id="layout">
    <div id="sidebar">
      <div class="sb-section">NAVIGATION</div>
      <button class="sb-btn" onclick="runCmd('about')"><span class="sb-icon">◆</span>ABOUT<span class="sb-arrow">►</span></button>
      <button class="sb-btn" onclick="runCmd('projects')"><span class="sb-icon">◆</span>PROJECTS<span class="sb-arrow">►</span></button>
      <button class="sb-btn" onclick="runCmd('music')"><span class="sb-icon">◆</span>MUSIC<span class="sb-arrow">►</span></button>
      <button class="sb-btn" onclick="runCmd('contact')"><span class="sb-icon">◆</span>CONTACT<span class="sb-arrow">►</span></button>
      <button class="sb-btn" onclick="runCmd('map')"><span class="sb-icon">◆</span>MC SERVER MAP<span class="sb-arrow">►</span></button>
      <button class="sb-btn" onclick="runCmd('bird-classifier')"><span class="sb-icon">◆</span>CLASSIFIER<span class="sb-arrow">►</span></button>
      <button class="sb-btn" onclick="runCmd('gallery')"><span class="sb-icon">◆</span>MC GALLERY<span class="sb-arrow">►</span></button>

      <div class="sb-section">PROJECTS</div>
      <button class="sb-proj-btn" onclick="runCmd('projectoculosaurus')">OCULOSAURUS</button>
      <button class="sb-proj-btn" onclick="runCmd('projectwaste-drone')">WASTE-DRONE</button>
      <button class="sb-proj-btn" onclick="runCmd('projectsong-visualizer')">SONG-VISUALIZER</button>
      <button class="sb-proj-btn" onclick="runCmd('projectbird-classifier')">BIRD-CLASSIFIER</button>
      <button class="sb-proj-btn" onclick="runCmd('projectmodpack-updater')">MODPACK-UPDATER</button>
      <button class="sb-proj-btn" onclick="runCmd('projectvisaudio')">VISAUDIO</button>
      <button class="sb-proj-btn" onclick="runCmd('projectfretwatch')">FRETWATCH</button>
      <button class="sb-proj-btn" onclick="runCmd('projectborn-in-spellbooks')">BORN-IN-SPELLBOOKS</button>
      <button class="sb-proj-btn" onclick="runCmd('projectpersonal-website')">PERSONAL-WEBSITE</button>
      <button class="sb-proj-btn" onclick="runCmd('projectminecraft-server')">MINECRAFT-SERVER</button>

      <div class="sb-section">SYSTEM</div>
      <button class="sb-btn" onclick="runCmd('help')"><span class="sb-icon">?</span>HELP<span class="sb-arrow">►</span></button>
      <button class="sb-btn" onclick="runCmd('clear')"><span class="sb-icon">×</span>CLEAR<span class="sb-arrow">►</span></button>
    </div>

    <div id="terminal">
      <div id="output"></div>
      <div id="input-area">
        <div id="quickbar">
          <button class="qbtn" onclick="runCmd('about')">▸ ABOUT</button>
          <button class="qbtn" onclick="runCmd('projects')">▸ PROJECTS</button>
          <button class="qbtn" onclick="runCmd('music')">▸ MUSIC</button>
          <button class="qbtn" onclick="runCmd('contact')">▸ CONTACT</button>
          <button class="qbtn" onclick="runCmd('map')">▸ MC MAP</button>
          <button class="qbtn" onclick="runCmd('bird-classifier')" style="border-color:#00aa88;color:#00aa88;">▸ CLASSIFIER</button>
          <button class="qbtn" onclick="runCmd('gallery')">▸ MC GALLERY</button>
          <button class="qbtn" onclick="runCmd('help')">▸ HELP</button>
          <button class="qbtn" onclick="runCmd('clear')">▸ CLEAR</button>
        </div>
        <div id="input-row">
          <div id="prompt">
            <span class="u">nick</span><span style="color:var(--mgs-border)">@</span><span class="h">burczyk</span><span style="color:var(--mgs-border)">:~</span><span class="s">$</span>
          </div>
          <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="enter command...">
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Pass Django static URLs to JavaScript -->
<script>
const STATIC_URLS = {
  ring:       "{% static 'audio/ring.mp3' %}",
  hover:      "{% static 'audio/hover.mp3' %}",
  click:      "{% static 'audio/click.mp3' %}",
  error:      "{% static 'audio/error.mp3' %}",
  menu:       "{% static 'audio/menu.mp3' %}",
  open:       "{% static 'audio/open.mp3' %}",
  uploadFile: "{% url 'upload_file' %}",
  gallery:    "{% url 'gallery' %}",
};
</script>
<script src="{% static 'scripts/portfolio.js' %}"></script>
</body>
</html>
